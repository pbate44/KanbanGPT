{% extends "base.html" %}
{% load static %}
{% block title %}Password Updated - KanbanGPT{% endblock %}
{% block additional_styles %}
<link rel="stylesheet" href="{% static 'css/shopfront/login.css' %}" />
{% endblock %}

{% block content %}
<main class="login__main">
  <section class="login__main-section">
    <header class="login__main-title">
      <div class="login__logo-badge" aria-hidden="true">
        <i class="bi bi-check2-circle"></i>
      </div>
      <h1>Password updated</h1>
      <p>You can now log in with your new password.</p>
    </header>

    <a class="login__main-submit" href="{% url 'login' %}">
      <span>Back to login</span>
    </a>
  </section>
</main>
{% endblock %}
