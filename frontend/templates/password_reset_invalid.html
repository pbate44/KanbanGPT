{% extends "base.html" %}
{% load static %}
{% block title %}Reset Link Invalid - KanbanGPT{% endblock %}
{% block additional_styles %}
<link rel="stylesheet" href="{% static 'css/shopfront/login.css' %}" />
{% endblock %}

{% block content %}
<main class="login__main">
  <section class="login__main-section">
    <header class="login__main-title">
      <div class="login__logo-badge" aria-hidden="true">
        <i class="bi bi-x-circle"></i>
      </div>
      <h1>Link expired or invalid</h1>
      <p>This reset link isn’t valid anymore. You can request a new one.</p>
    </header>

    <a class="login__main-submit" href="{% url 'password_reset' %}">
      <span>Request a new link</span>
    </a>
  </section>
</main>
{% endblock %}
